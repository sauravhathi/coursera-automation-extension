<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coursera Automation Extension</title>
    <script src="scripts/popup.js"></script>
    <link rel="stylesheet" href="ui/popup.css" />
  </head>

  <body>
    <div id="courseraModel">
      <div id="courseraModelContent">
        <button id="settingsBtn" class="settings-btn" title="Open Settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
        <h1 id="courseraModelTitle">Coursera Automation Extension</h1>

        <!-- User Profile Header -->
        <div id="userProfile" class="user-profile hidden">
          <div class="user-info">
            <span id="userName" class="user-name">Loading...</span>
            <span id="userEmail" class="user-email"></span>
          </div>
          <div id="proBadge" class="pro-badge hidden">ACTIVATED</div>
        </div>

        <!-- Usage Statistics -->
        <div id="usageStats" class="usage-stats hidden">
          <div class="stat-item">
            <span class="stat-label">Usage Status</span>
            <span id="remainingQuota" class="stat-value">0/0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Expiry Date</span>
            <span id="daysRemaining" class="stat-value">0 days</span>
          </div>
        </div>
        
        <div id="courseraModelGrid"></div>

        <!-- Buy Button CTA -->
        <div id="buyContainer" class="buy-container">
          <button id="buyBtn" class="buy-btn">Unlock All Features ✨</button>
        </div>
      </div>
      
      <footer id="footer">
        <svg
          stroke="#ffffff"
          fill="#ffffff"
          stroke-width="0"
          viewBox="0 0 384 512"
          height="1em"
          width="1em"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M384 144c0-44.2-35.8-80-80-80s-80 35.8-80 80c0 36.4 24.3 67.1 57.5 76.8-.6 16.1-4.2 28.5-11 36.9-15.4 19.2-49.3 22.4-85.2 25.7-28.2 2.6-57.4 5.4-81.3 16.9v-144c32.5-10.2 56-40.5 56-76.3 0-44.2-35.8-80-80-80S0 35.8 0 80c0 35.8 23.5 66.1 56 76.3v199.3C23.5 365.9 0 396.2 0 432c0 44.2 35.8 80 80 80s80-35.8 80-80c0-34-21.2-63.1-51.2-74.6 3.1-5.2 7.8-9.8 14.9-13.4 16.2-8.2 40.4-10.4 66.1-12.8 42.2-3.9 90-8.4 118.2-43.4 14-17.4 21.1-39.8 21.6-67.9 31.6-10.8 54.4-40.7 54.4-75.9zM80 64c8.8 0 16 7.2 16 16s-7.2 16-16 16-16-7.2-16-16 7.2-16 16-16zm0 384c-8.8 0-16-7.2-16-16s-7.2-16 16-16 16 7.2 16 16-7.2 16-16 16zm224-320c8.8 0 16 7.2 16 16s-7.2 16-16 16-16-7.2-16-16 7.2-16 16-16z"
          ></path>
        </svg>
        <span id="author">Saurav Hathi</span>
      </footer>
    </div>
  </body>
</html>
